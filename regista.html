<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regista Lifepack G10 v8.0 - Controllo & Log</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { background-color: #1e222b; color: #f5f6fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 15px; height: 100vh; box-sizing: border-box; }
        h1 { margin-top: 0; color: #00a8ff; font-size: 24px; border-bottom: 2px solid #2f3640; padding-bottom: 8px; }
        
        /* Layout a tre colonne: Parametri | Ritmi | Console Studente */
        .Griglia-regia { display: grid; grid-template-columns: 280px 1fr 320px; gap: 15px; height: calc(100% - 50px); }
        
        .colonna { background: #2f3640; padding: 15px; border-radius: 8px; box-sizing: border-box; display: flex; flex-direction: column; overflow-y: auto; }
        .titolo-colonna { font-size: 14px; font-weight: bold; text-transform: uppercase; color: #718093; margin-bottom: 12px; border-bottom: 1px solid #3f4756; padding-bottom: 4px; }
        
        /* Box Parametri */
        .control-group { margin-bottom: 12px; }
        label { display: block; font-size: 12px; margin-bottom: 4px; color: #dcdde1; font-weight: 600; }
        input[type="number"], select { width: 100%; padding: 8px; background: #1e222b; border: 1px solid #487eb0; color: #fff; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        
        /* Bottoni Ritmi */
        .btn-ritmo { width: 100%; padding: 10px; margin-bottom: 6px; background: #353b48; border: 1px solid #718093; color: #fff; border-radius: 5px; cursor: pointer; text-align: left; font-size: 14px; font-weight: 500; transition: background 0.2s; }
        .btn-ritmo:hover { background: #4b5563; }
        .btn-ritmo.selezionato { background: #2ed573; border-color: #26af5f; font-weight: bold; }
        
        /* CONSOLE LOG STUDENTE */
        .stato-monitor-box { background: #1e222b; padding: 10px; border-radius: 5px; margin-bottom: 10px; border-left: 4px solid #00a8ff; }
        .stato-label { font-size: 11px; color: #718093; text-transform: uppercase; }
        .stato-valore { font-size: 14px; font-weight: bold; color: #00ff00; margin-top: 2px; }
        
        .log-area { flex: 1; background: #1e222b; border: 1px solid #444; border-radius: 5px; padding: 8px; font-family: monospace; font-size: 12px; overflow-y: auto; color: #00ff00; }
        .log-entry { margin-bottom: 6px; border-bottom: 1px dashed #2f3640; padding-bottom: 4px; line-height: 1.3; }
        .log-time { color: #eccc68; margin-right: 5px; }
        .btn-clear-log { background: #c23616; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; margin-top: 5px; align-self: flex-end; }

        /* Barra di Connessione Superiore */
        .setup-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; background: #2f3640; padding: 8px 15px; border-radius: 6px; }
        .btn-azione { background: #00a8ff; border: none; color: white; padding: 8px 16px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .btn-azione:hover { background: #0097e6; }
    </style>
</head>
<body>

    <div class="setup-bar">
        <label style="display:inline; margin: 0;">PIN REGIA:</label>
        <input type="number" id="pin-regista" value="1234" style="width: 90px; padding: 5px; font-size: 14px;">
        <button class="btn-azione" id="btn-attiva-regia">Attiva Canale Regia</button>
        <span id="stato-connessione" style="color: #eccc68; font-size: 13px; font-weight: bold; margin-left: 10px;">Offline</span>
    </div>

    <div class="Griglia-regia">
        
        <div class="colonna">
            <div class="titolo-colonna">Parametri Vitali</div>
            
            <div class="control-group">
                <label>Frequenza Cardiaca (FC)</label>
                <input type="number" id="p-fc" value="65" oninput="inviaDatiAlMonitor()">
            </div>
            
            <div class="control-group">
                <label>Pressione Sistolica (PAS)</label>
                <input type="number" id="p-pas" value="120" oninput="inviaDatiAlMonitor()">
            </div>
            
            <div class="control-group">
                <label>Pressione Diastolica (PAD)</label>
                <input type="number" id="p-pad" value="80" oninput="inviaDatiAlMonitor()">
            </div>
            
            <div class="control-group">
                <label>Saturazione SpO2 (%)</label>
                <input type="number" id="p-spo2" value="96" oninput="inviaDatiAlMonitor()">
            </div>
            
            <div class="control-group">
                <label>Freq. Respiratoria (FR)</label>
                <input type="number" id="p-fr" value="14" oninput="inviaDatiAlMonitor()">
            </div>
            
            <div class="control-group">
                <label>EtCO2 (mmHg)</label>
                <input type="number" id="p-etco2" value="38" oninput="inviaDatiAlMonitor()">
            </div>

            <div class="control-group" style="margin-top:20px; background: #3a4252; padding: 10px; border-radius: 5px;">
                <label style="color:#00a8ff;">⚡ Automazione Shock</label>
                <select id="auto-risposta-shock" style="margin-top: 5px;">
                    <option value="NESSUNA">Nessuna (Resta immutato)</option>
                    <option value="SINUSALE">Passa a Sinusale (FC 72, PA 120/80)</option>
                    <option value="BRADI">Passa a Sinusale Bradi (FC 42)</option>
                    <option value="ASISTOLIA">Passa ad Asistolia (FC 0)</option>
                </select>
            </div>
        </div>

        <div class="colonna">
            <div class="titolo-colonna">Selettore Ritmo Clinico</div>
            <div id="lista-ritmi">
                </div>
        </div>

        <div class="colonna">
            <div class="titolo-colonna">Console Monitoraggio Studente</div>
            
            <div class="stato-monitor-box">
                <div class="stato-label">Modalità Attuale Monitor:</div>
                <div class="stato-valore" id="stato-modalita-monitor">IN ATTESA...</div>
            </div>

            <div class="stato-label" style="margin-bottom: 5px;">Registro Log Attività:</div>
            <div class="log-area" id="log-studenti-box">
                <div style="color: #666;">In attesa di azioni dal monitor...</div>
            </div>
            <button class="btn-clear-log" onclick="svuotaLog()">Cancella Log</button>
        </div>

    </div>

    <script>
        const btnAttivaRegia = document.getElementById('btn-attiva-regia'), pinInput = document.getElementById('pin-regista'), statoConn = document.getElementById('stato-connessione');
        let peer = null, connClient = null;
        let ritmoSelezionato = "Sinusale";

        const elenchiRitmi = [
            "Sinusale", "Sinusale tact", "Sinusale brac", "Non in lettura", "Asistolia", 
            "TV con polso", "TV senza polso", "FV", "IMA", "TPSV", "Fibrillazione", 
            "Flutter atriale", "Torsione di punta", "BAV 3"
        ];

        // Genera i bottoni dei ritmi
        function compilaPulsantiRitmo() {
            const container = document.getElementById('lista-ritmi');
            container.innerHTML = "";
            elenchiRitmi.forEach(ritmo => {
                const btn = document.createElement('button');
                btn.className = "btn-ritmo";
                if(ritmo === ritmoSelezionato) btn.className += " selezionato";
                btn.innerText = ritmo;
                btn.onclick = () => impostaRitmoEcg(ritmo);
                container.appendChild(btn);
            });
        }

        function impostaRitmoEcg(nuovoRitmo) {
            ritmoSelezionato = nuovoRitmo;
            compilaPulsantiRitmo();
            
            // Logiche cliniche automatiche sui parametri alla selezione del ritmo
            if(nuovoRitmo === "Asistolia" || nuovoRitmo === "TV senza polso" || nuovoRitmo === "FV" || nuovoRitmo === "Torsione di punta") {
                document.getElementById('p-fc').value = 0;
                document.getElementById('p-pas').value = 0;
                document.getElementById('p-pad').value = 0;
                document.getElementById('p-spo2').value = 0;
                document.getElementById('p-etco2').value = 0;
            } else if(nuovoRitmo === "Sinusale tact" && document.getElementById('p-fc').value <= 100) {
                document.getElementById('p-fc').value = 130;
            } else if(nuovoRitmo === "Sinusale brac" && document.getElementById('p-fc').value >= 60) {
                document.getElementById('p-fc').value = 42;
            } else if(nuovoRitmo === "Sinusale" && document.getElementById('p-fc').value == 0) {
                document.getElementById('p-fc').value = 65;
                document.getElementById('p-pas').value = 120;
                document.getElementById('p-pad').value = 80;
                document.getElementById('p-spo2').value = 97;
                document.getElementById('p-etco2').value = 38;
            }
            
            inviaDatiAlMonitor();
        }

        function inviaDatiAlMonitor() {
            if (connClient && connClient.open) {
                const payload = {
                    fc: document.getElementById('p-fc').value,
                    pas: document.getElementById('p-pas').value,
                    pad: document.getElementById('p-pad').value,
                    spo2: document.getElementById('p-spo2').value,
                    fr: document.getElementById('p-fr').value,
                    etco2: document.getElementById('p-etco2').value,
                    ritmo: ritmoSelezionato
                };
                connClient.send(payload);
            }
        }

        // Gestione del Log Ricevuto dal Monitor Studente
        function aggiungiLog(messaggio) {
            const logBox = document.getElementById('log-studenti-box');
            if(logBox.innerHTML.includes("In attesa di azioni")) logBox.innerHTML = "";
            
            const ora = new Date();
            const timestamp = `${String(ora.getHours()).padStart(2, '0')}:${String(ora.getMinutes()).padStart(2, '0')}:${String(ora.getSeconds()).padStart(2, '0')}`;
            
            const entry = document.createElement('div');
            entry.className = "log-entry";
            entry.innerHTML = `<span class="log-time">[${timestamp}]</span> ${messaggio}`;
            
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight; // Auto-scroll in basso

            // INTERCETTAZIONE DELLA SCARICA PER RISPOSTA AUTOMATICA
            if(messaggio.includes("SCARICA EROGATA")) {
                gestisciRispostaAutomaticaAlloShock();
            }
            
            // INTERCETTAZIONE CAMBIO MODALITÀ STRUMENTO
            if(messaggio.includes("Cambio Modalità:")) {
                const mode = messaggio.split(": ")[1];
                document.getElementById('stato-modalita-monitor').innerText = mode;
            }
        }

        function svuotaLog() {
            document.getElementById('log-studenti-box').innerHTML = '<div style="color: #666;">Log cancellato. In attesa...</div>';
        }

        // Regola la reazione automatica del paziente dopo lo shock elettrico
        function gestisciRispostaAutomaticaAlloShock() {
            const tipoRisposta = document.getElementById('auto-risposta-shock').value;
            if(tipoRisposta === "NESSUNA") return;

            setTimeout(() => {
                if(tipoRisposta === "SINUSALE") {
                    document.getElementById('p-fc').value = 72;
                    document.getElementById('p-pas').value = 120;
                    document.getElementById('p-pad').value = 80;
                    document.getElementById('p-spo2').value = 96;
                    document.getElementById('p-fr').value = 14;
                    document.getElementById('p-etco2').value = 36;
                    ritmoSelezionato = "Sinusale";
                } else if(tipoRisposta === "BRADI") {
                    document.getElementById('p-fc').value = 42;
                    document.getElementById('p-pas').value = 95;
                    document.getElementById('p-pad').value = 55;
                    document.getElementById('p-spo2').value = 92;
                    ritmoSelezionato = "Sinusale brac";
                } else if(tipoRisposta === "ASISTOLIA") {
                    document.getElementById('p-fc').value = 0;
                    document.getElementById('p-pas').value = 0;
                    document.getElementById('p-pad').value = 0;
                    document.getElementById('p-spo2').value = 0;
                    document.getElementById('p-etco2').value = 0;
                    ritmoSelezionato = "Asistolia";
                }
                compilaPulsantiRitmo();
                inviaDatiAlMonitor();
                aggiungiLog(`🤖 Sistema: Trigger shock attivo. Il paziente risponde passando a ${ritmoSelezionato}.`);
            }, 2000); // Ritardo di 2 secondi per simulare la ripresa elettromeccanica del cuore
        }

        // Attivazione Server Regia PeerJS
        btnAttivaRegia.addEventListener('click', () => {
            const pin = pinInput.value.trim();
            if(pin.length !== 4) return alert("Inserisci un PIN di 4 cifre.");
            statoConn.innerText = "Attivazione server...";

            peer = new Peer("sim-regista-" + pin);
            
            peer.on('open', () => {
                statoConn.innerText = "Online - In attesa del monitor...";
                statoConn.style.color = "#2ed573";
            });

            peer.on('connection', (connection) => {
                connClient = connection;
                statoConn.innerText = "CONNESSO al Monitor";
                statoConn.style.color = "#00ffff";
                
                // Invia subito i parametri di partenza all'allineamento
                setTimeout(inviaDatiAlMonitor, 500);

                // Ascolta i log inviati dal monitor degli studenti
                connClient.on('data', (data) => {
                    if (data.azioneStudente !== undefined) {
                        aggiungiLog(data.azioneStudente);
                    }
                });
            });

            peer.on('error', (err) => {
                statoConn.innerText = "Errore di rete.";
                statoConn.style.color = "#ff4757";
                console.error(err);
            });
        });

        // Avvio Interfaccia
        compilaPulsantiRitmo();
    </script>
</body>
</html>
